<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pipes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <h1>Pipes</h1>
      </div>
      <p class="subtitle">Drehe die Rohre, bis alles mit der Quelle verbunden ist.</p>
    </header>

    <section class="controls">
      <div class="segmented" role="radiogroup" aria-label="Schwierigkeit">
        <button class="seg" data-size="5" role="radio" aria-checked="false">Leicht</button>
        <button class="seg is-active" data-size="7" role="radio" aria-checked="true">Mittel</button>
        <button class="seg" data-size="9" role="radio" aria-checked="false">Schwer</button>
        <button class="seg" data-size="11" role="radio" aria-checked="false">Experte</button>
      </div>

      <div class="stats">
        <div class="stat" id="time-stat">
          <span class="stat-label">Zeit</span>
          <span class="stat-value" id="time">0:00</span>
        </div>
        <div class="stat">
          <span class="stat-label">Züge</span>
          <span class="stat-value" id="moves">0</span>
        </div>
        <div class="stat" id="progress-stat" hidden>
          <span class="stat-label">Verbunden</span>
          <span class="stat-value" id="progress">0</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn-check" id="check-btn" hidden>Lösung prüfen</button>
        <button class="btn-new" id="new-game">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-2.64-6.36" />
            <path d="M21 3v6h-6" />
          </svg>
          Neues Spiel
        </button>
        <button class="btn-icon" id="open-settings" aria-label="Einstellungen">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
      </div>
    </section>

    <section class="board-wrap">
      <div class="board" id="board"></div>
      <div class="win" id="win" hidden>
        <div class="win-card">
          <div class="win-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6 9 17l-5-5" />
            </svg>
          </div>
          <h2>Gelöst!</h2>
          <p id="win-detail">Alle Rohre verbunden.</p>
          <button class="btn-new" id="win-again">Nochmal</button>
        </div>
      </div>
    </section>

    <footer class="hint">
      <span id="hint-text">Linksklick dreht im Uhrzeigersinn · Rechtsklick dagegen</span>
    </footer>
  </main>

  <div class="settings-overlay" id="settings-overlay" hidden>
    <aside class="settings-panel" role="dialog" aria-label="Einstellungen" aria-modal="true">
      <header class="settings-head">
        <h2>Einstellungen</h2>
        <button class="settings-close" id="close-settings" aria-label="Schließen">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
      </header>
      <div class="settings-list" id="settings-list"></div>
    </aside>
  </div>

  <script src="game.js"></script>
</body>
</html>
